version: "3.9"

services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "@Glms12345"
    ports:
      - "1433:1433"
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: ./GLMS.API
    ports:
      - "8080:80"
    depends_on:
      - sql-server-db
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=GLMS;User Id=sa;Password=@Glms12345;TrustServerCertificate=True;"
      ASPNETCORE_URLS: "http://+:80"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: ./PROGPOEP2
    ports:
      - "8081:80"
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_URLS: "http://+:80"
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge